name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - MyShop.Tests.Unit/MyShop.Tests.Unit.csproj
          - MyShop.Tests.Integration/MyShop.Tests.Integration.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Build
        run: dotnet build ${{ matrix.project }} --no-restore --configuration Release

      - name: Test
        run: dotnet test ${{ matrix.project }} --no-build --configuration Release

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: ./myshop.client
        run: npm ci

      - name: Build frontend
        working-directory: ./myshop.client
        run: npm run build
